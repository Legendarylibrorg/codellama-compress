name: Security Checks

on:
  pull_request:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Security Tools
        run: |
          python -m pip install --upgrade pip
          pip install detect-secrets pip-audit

      - name: Secret Scan
        run: |
          if [ -f .secrets.baseline ]; then
            git ls-files -z | xargs -0 detect-secrets-hook --baseline .secrets.baseline
          else
            detect-secrets scan . > .secrets.baseline
            git diff --exit-code .secrets.baseline
          fi

      - name: Dependency Vulnerability Audit
        run: |
          # Audit the *actual* project dependencies from pyproject by installing the package,
          # rather than relying on a potentially stale requirements.txt.
          python -m pip install .
          pip-audit
