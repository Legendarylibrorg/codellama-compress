name: CI

on:
  pull_request:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  lint-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install .
          pip install -r requirements-dev.txt

      - name: Ruff
        run: ruff check .

      - name: Black
        run: black --check .

      - name: Smoke import
        run: |
          python -c "import codellama_compress; import codellama_compress.cli; print(codellama_compress.__version__)"

      - name: Pytest
        run: pytest -q

  eval-extra-import:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install (eval extra)
        run: |
          python -m pip install --upgrade pip
          pip install ".[eval]"

      - name: Smoke import benchmarks
        run: python -c "import codellama_compress.benchmarks; print('ok')"

  code-eval-import:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Smoke import code eval
        run: python -c "import codellama_compress.code_eval; import codellama_compress.code_exec; print('ok')"

